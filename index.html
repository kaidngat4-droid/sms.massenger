<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مرسل SMS اليمن</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:#0f2b3d; padding:20px; }
        .container { max-width:650px; margin:auto; background:#fff; border-radius:28px; padding:20px; }
        h2 { color:#0a2e3f; border-right:5px solid #ff8c42; padding-right:15px; margin-bottom:20px; }
        textarea, input { width:100%; padding:10px; margin:8px 0; border-radius:16px; border:1px solid #ccc; }
        button { background:#ff8c42; border:none; padding:8px 16px; border-radius:30px; color:white; font-weight:bold; cursor:pointer; margin:4px; }
        .main-btn { background:linear-gradient(95deg, #ff8c42, #ffb347); width:100%; padding:12px; font-size:1.1rem; margin-top:12px; }
        .contact { background:#f1f5f9; padding:10px; border-radius:16px; margin:8px 0; display:flex; align-items:center; gap:10px; }
        .contact input { width:20px; margin:0; }
        .contact span { flex:1; }
        .del { color:#e53e3e; cursor:pointer; font-weight:bold; }
        .log { background:#1e2f39; color:#a0d2eb; border-radius:16px; padding:10px; font-size:0.75rem; max-height:150px; overflow:auto; margin-top:15px; }
        .progress { background:#e2e8f0; border-radius:20px; height:8px; margin:10px 0; }
        .progress-fill { width:0%; height:8px; background:#ff8c42; border-radius:20px; transition:width 0.3s; }
        .warning { background:#fff3e0; border-right:4px solid #ff8c42; padding:10px; border-radius:12px; font-size:0.7rem; margin:10px 0; }
        .flex { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0; }
    </style>
</head>
<body>
<div class="container">
    <h2>📱 مرسل SMS اليمن</h2>

    <div class="flex">
        <button onclick="importContacts()">📂 استيراد من الهاتف</button>
        <button onclick="selectAll()">✅ الكل</button>
        <button onclick="deselectAll()">❌ إلغاء</button>
    </div>

    <div id="contactsList"></div>

    <div class="flex">
        <input type="text" id="newName" placeholder="الاسم">
        <input type="text" id="newNumber" placeholder="الرقم (مثال: 771234567)">
        <button onclick="addContact()">➕ أضف</button>
    </div>

    <textarea id="message" rows="3" placeholder="نص الرسالة"></textarea>
    <div style="font-size:0.7rem;">عدد الحروف: <span id="charCount">0</span> | عدد الرسائل: <span id="smsCount">1</span></div>

    <button id="sendBtn" class="main-btn">📤 إرسال للمحددين</button>
    <button id="stopBtn" style="background:#d9534f;">⏹️ إيقاف</button>

    <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
    <div class="log" id="logArea">✨ جاهز. أضف جهات اتصال وحدد المستلمين.</div>
    <div class="warning">⚠️ إذا لم تفتح الرسائل، امنح إذن "النوافذ المنبثقة" لهذا الموقع (القفل 🔒 → إعدادات الموقع → النوافذ المنبثقة → السماح).</div>
</div>

<script>
    let contacts = [];
    let selectedIds = [];
    let isSending = false, sendQueue = [], currentIndex = 0, sendTimeout = null;

    function cleanNumber(raw) {
        let cleaned = raw.replace(/[^\d+]/g, '');
        if (cleaned.startsWith('00')) cleaned = '+' + cleaned.slice(2);
        if (cleaned.startsWith('+')) {
            if (cleaned.startsWith('+967')) return cleaned;
            cleaned = cleaned.substring(1);
        }
        if (cleaned.startsWith('0')) cleaned = cleaned.substring(1);
        if (cleaned.startsWith('967')) return cleaned;
        return '967' + cleaned;
    }

    function save() { localStorage.setItem('contacts', JSON.stringify(contacts)); localStorage.setItem('selected', JSON.stringify(selectedIds)); }
    function load() {
        let c = localStorage.getItem('contacts'); if (c) contacts = JSON.parse(c);
        let s = localStorage.getItem('selected'); if (s) selectedIds = JSON.parse(s);
        render();
    }

    function render() {
        let div = document.getElementById('contactsList');
        if (!contacts.length) { div.innerHTML = '<div style="padding:12px;text-align:center;">📭 لا توجد جهات</div>'; return; }
        div.innerHTML = '';
        contacts.forEach(c => {
            let checked = selectedIds.includes(c.id);
            div.innerHTML += `<div class="contact">
                <input type="checkbox" data-id="${c.id}" ${checked ? 'checked' : ''}>
                <span><strong>${escapeHtml(c.name)}</strong> - ${c.number}</span>
                <span class="del" data-id="${c.id}">🗑️</span>
            </div>`;
        });
        document.querySelectorAll('.contact input').forEach(cb => cb.addEventListener('change', (e) => {
            let id = parseInt(cb.dataset.id);
            if (cb.checked) { if (!selectedIds.includes(id)) selectedIds.push(id); }
            else { selectedIds = selectedIds.filter(i => i !== id); }
            save(); updateCount();
        }));
        document.querySelectorAll('.del').forEach(del => del.addEventListener('click', (e) => {
            let id = parseInt(del.dataset.id);
            contacts = contacts.filter(c => c.id !== id);
            selectedIds = selectedIds.filter(i => i !== id);
            save(); render(); addLog('🗑️ تم حذف جهة');
        }));
        updateCount();
    }
    function updateCount() { document.getElementById('logArea').innerHTML = `✅ تم تحديد ${selectedIds.length} مستلم`; }
    function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function addContact() {
        let name = document.getElementById('newName').value.trim();
        let num = cleanNumber(document.getElementById('newNumber').value.trim());
        if (!name || !num) return;
        if (contacts.some(c => c.number === num)) { alert('الرقم موجود'); return; }
        contacts.push({ id: Date.now(), name, number: num });
        save(); render(); addLog(`➕ تم إضافة ${name} - ${num}`);
        document.getElementById('newName').value = ''; document.getElementById('newNumber').value = '';
    }

    async function importContacts() {
        if ('contacts' in navigator) {
            try {
                let list = await navigator.contacts.select(['name','tel'], { multiple: true });
                let added = 0;
                for (let c of list) {
                    let name = c.name?.[0] || 'جهة';
                    let tel = c.tel?.[0];
                    if (tel) {
                        let num = cleanNumber(tel);
                        if (!contacts.some(ex => ex.number === num)) {
                            contacts.push({ id: Date.now() + added, name, number: num });
                            added++;
                        }
                    }
                }
                if (added) { save(); render(); addLog(`📂 تم استيراد ${added} جهة`); }
                else addLog('⚠️ لا توجد أرقام جديدة', true);
            } catch(e) { addLog('❌ فشل الاستيراد', true); }
        } else { alert('غير مدعوم على هذا المتصفح'); }
    }

    function selectAll() { selectedIds = contacts.map(c => c.id); render(); save(); addLog('✅ تم تحديد الكل'); }
    function deselectAll() { selectedIds = []; render(); save(); addLog('◻️ تم إلغاء الكل'); }

    function addLog(msg, isErr = false) {
        let log = document.getElementById('logArea');
        let time = new Date().toLocaleTimeString('ar-EG');
        log.innerHTML += `<div>${isErr ? '⚠️' : '✅'} [${time}] ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function openSms(number, text) {
        let url = `sms:${number}?body=${encodeURIComponent(text)}`;
        let win = window.open(url, '_blank');
        if (!win || win.closed) { addLog(`❌ فشل فتح الرقم ${number}`, true); return false; }
        setTimeout(() => { if (win && !win.closed) win.close(); }, 1500);
        return true;
    }

    function sendNext() {
        if (!isSending) return;
        if (currentIndex >= sendQueue.length) {
            addLog(`🎉 تم فتح تطبيق الرسائل لـ ${sendQueue.length} جهة`);
            isSending = false;
            document.getElementById('progressFill').style.width = '100%';
            return;
        }
        let item = sendQueue[currentIndex];
        let msg = document.getElementById('message').value.trim();
        if (!msg) { addLog('❌ نص فارغ', true); stopSending(); return; }
        addLog(`📨 فتح: ${item.name} (${item.number})`);
        openSms(item.number, msg);
        currentIndex++;
        let percent = (currentIndex / sendQueue.length) * 100;
        document.getElementById('progressFill').style.width = `${percent}%`;
        if (isSending) sendTimeout = setTimeout(() => sendNext(), 2200);
    }

    function startSending() {
        if (isSending) { addLog('⚠️ الإرسال قيد التشغيل', true); return; }
        let msg = document.getElementById('message').value.trim();
        if (!msg) { addLog('❌ اكتب الرسالة أولاً', true); return; }
        let selected = contacts.filter(c => selectedIds.includes(c.id));
        if (!selected.length) { addLog('❌ لم يتم تحديد مستلمين', true); return; }
        sendQueue = selected.map(c => ({ number: c.number, name: c.name }));
        currentIndex = 0;
        isSending = true;
        document.getElementById('progressFill').style.width = '0%';
        addLog(`🚀 بدء إرسال إلى ${sendQueue.length} مستلم`);
        sendNext();
    }

    function stopSending() {
        if (sendTimeout) clearTimeout(sendTimeout);
        isSending = false;
        addLog('⏸️ تم الإيقاف', true);
    }

    document.getElementById('sendBtn').onclick = startSending;
    document.getElementById('stopBtn').onclick = stopSending;
    document.getElementById('message').addEventListener('input', () => {
        let len = document.getElementById('message').value.length;
        document.getElementById('charCount').innerText = len;
        document.getElementById('smsCount').innerText = Math.ceil(len/160) || 1;
    });

    load();
    addLog('💡 جاهز. أضف جهات وحدد المستلمين.');
</script>
</body>
</html>
